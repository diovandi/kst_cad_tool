name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run Ruff lint
        run: ruff check src tests scripts --select E9,F821,F822,F823

      - name: Run mypy
        run: mypy src/kst_rating_tool

      - name: Verify Fusion bundle sync
        run: python fusion360_addin/build_bundle.py --verify

      - name: Check markdown links
        run: python scripts/check_markdown_links.py

  test:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest --cov=kst_rating_tool --cov-report=term-missing

  benchmarks:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev,optimization]"

      - name: Run benchmark tests
        run: pytest benchmarks/test_benchmark_surrogates.py -q --no-cov
